apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-image
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/prathima471/EKS-AI-Image-API-Deployment.git
    targetRevision: main
    path: ai-image-project/helm-chart

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true