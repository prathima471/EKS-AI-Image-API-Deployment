apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-image-api-deployment
  labels:
    app: ai-image-api
    tier: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-image-api
  template:
    metadata:
      labels:
        app: ai-image-api
        tier: frontend
    spec:
      containers:
      - name: ai-image-api
        image: ai-image-api:1.0.0
        ports:
        - containerPort: 8000
        env:
          - name: DATABASE_URL
            value: "postgresql://postgres:postgres@postgres-service:5432/imagedb"
          - name: REDIS_HOST
            value: "redis-service"
          - name: REDIS_PORT
            value: "6379"
          - name: S3_BUCKET
            value: "ai-image-bucket"
          - name: AWS_REGION
            value: "us-east-1"
          - name: ENVIRONMENT
            value: "production"
          - name: APP_VERSION
            value: "1.0.0"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10    ← Wait before first check
          periodSeconds: 15          ← Check every 15 seconds
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10    ← Wait before first check
          periodSeconds: 15          ← Check every 15 seconds