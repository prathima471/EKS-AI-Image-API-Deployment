# ── API Service ──
api:
  replicas: 1
  image:
    repository: 123054099308.dkr.ecr.us-east-1.amazonaws.com/eks-ai-image-dev/api-service
    tag: "b250155"
    pullPolicy: IfNotPresent
  port: 8000
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPU: 70
  probes:
    liveness:
      path: /health
      initialDelaySeconds: 10
      periodSeconds: 15
    readiness:
      path: /ready
      initialDelaySeconds: 5
      periodSeconds: 10
# ── Worker Service ──
worker:
  replicas: 1
  image:
    repository: 123054099308.dkr.ecr.us-east-1.amazonaws.com/eks-ai-image-dev/worker-service
    tag: "b250155"
    pullPolicy: IfNotPresent
  port: 8001
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 8
    targetCPU: 60
  probes:
    liveness:
      path: /health
      initialDelaySeconds: 10
      periodSeconds: 15
    readiness:
      path: /ready
      initialDelaySeconds: 5
      periodSeconds: 10
# ── PostgreSQL ──
postgres:
  enabled: false # Use RDS instead
  image: postgres:15
  port: 5432
  database: imagedb
  username: postgres
  password: postgres
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
# ── Redis ──
redis:
  enabled: false # Use ElastiCache instead
  image: redis:7-alpine
  port: 6379
  resources:
    requests:
      cpu: "25m"
      memory: "32Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"
# ── Environment ──
env:
  environment: dev
  appVersion: "1.0.0"
  s3Bucket: eks-ai-image-dev-images-123054099308
  awsRegion: us-east-1
  databaseUrl: "postgresql://postgres:postgres123!@eks-ai-image-dev-postgres.cwna6kkewysn.us-east-1.rds.amazonaws.com:5432/imagedb"
  redisHost: "eks-ai-image-dev-redis.fnswe7.0001.use1.cache.amazonaws.com"
# ── Ingress ──
ingress:
  enabled: true
  className: alb
  scheme: internet-facing
  targetType: ip
# ---------------------------------------------------------
# Monitoring (Prometheus + Grafana)
# Disabled for dev cluster because t3.micro nodes are small
# Enable when cluster has larger instances
# ---------------------------------------------------------
monitoring:
  enabled: false
